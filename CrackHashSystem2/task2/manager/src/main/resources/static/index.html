<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrackHash Консоль</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

        :root {
            --bg: #f5f7fb;
            --card-bg: #ffffff;
            --card-border: #d9e2ef;
            --text-main: #1f2937;
            --text-muted: #5f6f84;
            --accent: #0f766e;
            --accent-soft: #ccfbf1;
            --danger: #dc2626;
            --danger-soft: #fee2e2;
            --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Manrope', sans-serif;
            color: var(--text-main);
            background: var(--bg);
            display: flex;
            justify-content: center;
            padding: 24px 16px;
        }

        .layout {
            width: min(1200px, 100%);
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
        }

        .full { grid-column: 1 / -1; }

        .panel {
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .panel::after {
            content: '';
            position: absolute;
            right: -18px;
            top: -18px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid var(--accent-soft);
            pointer-events: none;
        }

        h1 {
            margin: 0;
            font-size: clamp(28px, 4vw, 40px);
            color: #0b4f49;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 18px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input,
        button {
            width: 100%;
            border-radius: 12px;
            border: 1px solid transparent;
            padding: 10px 12px;
            font: inherit;
        }

        input {
            margin-bottom: 12px;
            background: #f9fbff;
            color: var(--text-main);
            border-color: #cfd9e8;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.18);
        }

        button {
            cursor: pointer;
            border: 1px solid #0d6c64;
            background: #0f766e;
            color: #ffffff;
            font-weight: 700;
            margin-top: 4px;
        }

        button.secondary {
            border-color: #b7c5d9;
            background: #eef3f9;
            color: #253347;
        }

        button.danger {
            border-color: #dc2626;
            background: var(--danger-soft);
            color: #991b1b;
        }

        .button-grid {
            display: grid;
            gap: 8px;
            grid-template-columns: 1fr;
        }

        .result {
            margin-top: 12px;
            border: 1px dashed #c9d5e8;
            background: #f8fbff;
            border-radius: 12px;
            padding: 10px;
            min-height: 44px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            line-height: 1.45;
            word-break: break-word;
        }

        .status-pill {
            display: inline-block;
            border-radius: 999px;
            padding: 4px 10px;
            font-weight: 700;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .status-IN_PROGRESS { background: #fff3cd; color: #8a6d00; }
        .status-READY { background: #d1fae5; color: #065f46; }
        .status-TIMEOUT { background: #ffedd5; color: #9a3412; }
        .status-CANCELED { background: #e0e7ff; color: #3730a3; }
        .status-ERROR { background: #fee2e2; color: #991b1b; }

        .inline {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .inline input[type='checkbox'] {
            width: 16px;
            height: 16px;
            margin: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
        }

        th, td {
            border-bottom: 1px solid #e2e8f0;
            padding: 8px 6px;
            text-align: left;
            vertical-align: top;
            word-break: break-word;
        }

        th { color: var(--text-muted); font-weight: 600; }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .small-btn {
            width: auto;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
            margin: 0;
        }
    </style>
</head>
<body>
<div class="layout">
    <section class="panel full">
        <h1>CrackHash Консоль</h1>
    </section>

    <section class="panel">
        <h2>Генерация MD5</h2>
        <form id="generatorForm">
            <label for="plainWord">Слово</label>
            <input id="plainWord" type="text" placeholder="Например: abcd" required />
            <button type="submit">Сгенерировать хэш</button>
        </form>
        <div class="result" id="hashResult">-</div>
    </section>

    <section class="panel">
        <h2>Запуск взлома</h2>
        <form id="crackForm">
            <label for="hashInput">MD5-хэш</label>
            <input id="hashInput" type="text" maxlength="32" placeholder="32 hex-символа" required />

            <label for="maxLengthInput">Максимальная длина</label>
            <input id="maxLengthInput" type="number" min="1" max="8" value="4" required />

            <button type="submit">Отправить в менеджер</button>
        </form>
        <div class="result" id="requestResult">-</div>
    </section>

    <section class="panel">
        <h2>Статус и отмена</h2>
        <form id="statusForm">
            <label for="requestIdInput">Request ID</label>
            <input id="requestIdInput" type="text" placeholder="UUID" required />
            <div class="button-grid">
                <button type="submit">Проверить статус</button>
                <button type="button" id="cancelOneBtn" class="secondary">Отменить этот запрос</button>
                <button type="button" id="cancelAllBtn" class="danger">Отменить все активные</button>
            </div>
        </form>
        <label class="inline">
            <input id="autoPoll" type="checkbox" checked />
            Автообновление каждую секунду
        </label>
        <div class="result" id="statusResult">-</div>
    </section>

    <section class="panel full">
        <div class="actions">
            <h2 style="margin: 0;">История задач (localStorage)</h2>
            <button id="clearHistoryBtn" class="small-btn danger" type="button">Очистить историю</button>
        </div>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                <tr>
                    <th>Время</th>
                    <th>Request ID</th>
                    <th>Хэш</th>
                    <th>MaxLen</th>
                    <th>Статус</th>
                    <th>Данные</th>
                    <th>Действие</th>
                </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </section>
</div>

<script>
    const HISTORY_KEY = 'crackhash_history_v2';

    const generatorForm = document.getElementById('generatorForm');
    const crackForm = document.getElementById('crackForm');
    const statusForm = document.getElementById('statusForm');

    const hashResult = document.getElementById('hashResult');
    const requestResult = document.getElementById('requestResult');
    const statusResult = document.getElementById('statusResult');
    const historyBody = document.getElementById('historyBody');

    const hashInput = document.getElementById('hashInput');
    const maxLengthInput = document.getElementById('maxLengthInput');
    const requestIdInput = document.getElementById('requestIdInput');
    const autoPoll = document.getElementById('autoPoll');

    const cancelOneBtn = document.getElementById('cancelOneBtn');
    const cancelAllBtn = document.getElementById('cancelAllBtn');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');

    let pollTimer = null;
    let history = loadHistory();

    renderHistory();

    generatorForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const word = document.getElementById('plainWord').value;

        hashResult.textContent = 'Вычисляю...';
        try {
            const response = await fetch('/api/hash/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ word })
            });
            const data = await response.json();
            hashResult.textContent = data.hash || 'Ошибка';
            if (data.hash) {
                hashInput.value = data.hash;
            }
        } catch (error) {
            hashResult.textContent = 'Ошибка запроса: ' + error.message;
        }
    });

    crackForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const hash = hashInput.value.trim();
        const maxLength = Number(maxLengthInput.value);

        requestResult.textContent = 'Отправляю запрос...';
        try {
            const response = await fetch('/api/hash/crack', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ hash, maxLength })
            });
            const data = await response.json();

            if (!data.requestId) {
                requestResult.textContent = JSON.stringify(data);
                return;
            }

            requestResult.textContent = data.requestId;
            requestIdInput.value = data.requestId;

            upsertHistory({
                requestId: data.requestId,
                hash,
                maxLength,
                status: 'IN_PROGRESS',
                data: null,
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            });

            if (autoPoll.checked) {
                startPolling(data.requestId);
            }
        } catch (error) {
            requestResult.textContent = 'Ошибка запроса: ' + error.message;
        }
    });

    statusForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        stopPolling();
        await checkStatus(requestIdInput.value.trim(), autoPoll.checked);
    });

    cancelOneBtn.addEventListener('click', async () => {
        const requestId = requestIdInput.value.trim();
        if (!requestId) {
            statusResult.textContent = 'Сначала укажите requestId';
            return;
        }

        try {
            const response = await fetch(`/api/hash/cancel?requestId=${encodeURIComponent(requestId)}`, {
                method: 'POST'
            });
            const data = await response.json();

            setStatusView(data.status, data.data);
            updateHistoryStatus(requestId, data.status, data.data);

            if (isTerminal(data.status)) {
                stopPolling();
            }
        } catch (error) {
            statusResult.textContent = 'Ошибка отмены: ' + error.message;
        }
    });

    cancelAllBtn.addEventListener('click', async () => {
        try {
            const response = await fetch('/api/hash/cancel-all', { method: 'POST' });
            const data = await response.json();
            const ids = Array.isArray(data.requestIds) ? data.requestIds : [];

            ids.forEach((requestId) => updateHistoryStatus(requestId, 'CANCELED', null));
            statusResult.textContent = `Отменено запросов: ${data.canceledCount || 0}`;
            stopPolling();
        } catch (error) {
            statusResult.textContent = 'Ошибка cancel-all: ' + error.message;
        }
    });

    clearHistoryBtn.addEventListener('click', () => {
        history = [];
        saveHistory();
        renderHistory();
    });

    historyBody.addEventListener('click', (event) => {
        const requestId = event.target.getAttribute('data-use-id');
        if (!requestId) {
            return;
        }
        requestIdInput.value = requestId;
    });

    function startPolling(requestId) {
        stopPolling();
        pollTimer = setInterval(() => {
            checkStatus(requestId, true);
        }, 1000);
        checkStatus(requestId, true);
    }

    function stopPolling() {
        if (pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
        }
    }

    async function checkStatus(requestId, fromAutoPoll = false) {
        if (!requestId) {
            statusResult.textContent = 'Укажите requestId';
            return;
        }

        try {
            const response = await fetch(`/api/hash/status?requestId=${encodeURIComponent(requestId)}`);
            const data = await response.json();

            setStatusView(data.status, data.data);
            updateHistoryStatus(requestId, data.status, data.data);

            if (isTerminal(data.status)) {
                stopPolling();
            } else if (!fromAutoPoll && autoPoll.checked) {
                startPolling(requestId);
            }
        } catch (error) {
            statusResult.textContent = 'Ошибка статуса: ' + error.message;
            stopPolling();
        }
    }

    function setStatusView(status, payload) {
        const cssClass = statusClass(status);
        const dataText = payload ? JSON.stringify(payload) : 'null';
        statusResult.innerHTML = `<span class="status-pill ${cssClass}">${status}</span><br/>data: ${dataText}`;
    }

    function isTerminal(status) {
        if (!status) {
            return false;
        }
        return status === 'READY'
            || status === 'TIMEOUT'
            || status === 'CANCELED'
            || status.startsWith('ERROR_');
    }

    function statusClass(status) {
        if (status === 'IN_PROGRESS') return 'status-IN_PROGRESS';
        if (status === 'READY') return 'status-READY';
        if (status === 'TIMEOUT') return 'status-TIMEOUT';
        if (status === 'CANCELED') return 'status-CANCELED';
        if (status && status.startsWith('ERROR_')) return 'status-ERROR';
        return 'status-ERROR';
    }

    function loadHistory() {
        try {
            const raw = localStorage.getItem(HISTORY_KEY);
            if (!raw) {
                return [];
            }
            const parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : [];
        } catch (_error) {
            return [];
        }
    }

    function saveHistory() {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function updateHistoryStatus(requestId, status, data) {
        const now = new Date().toISOString();
        const idx = history.findIndex((item) => item.requestId === requestId);

        if (idx === -1) {
            history.unshift({
                requestId,
                hash: '-',
                maxLength: '-',
                status,
                data,
                createdAt: now,
                updatedAt: now
            });
        } else {
            history[idx].status = status;
            history[idx].data = data;
            history[idx].updatedAt = now;
        }

        saveHistory();
        renderHistory();
    }

    function upsertHistory(entry) {
        const idx = history.findIndex((item) => item.requestId === entry.requestId);
        if (idx === -1) {
            history.unshift(entry);
        } else {
            history[idx] = { ...history[idx], ...entry, updatedAt: new Date().toISOString() };
        }

        if (history.length > 200) {
            history = history.slice(0, 200);
        }

        saveHistory();
        renderHistory();
    }

    function renderHistory() {
        historyBody.innerHTML = '';

        if (history.length === 0) {
            const row = document.createElement('tr');
            row.innerHTML = `<td colspan="7" style="color:#5f6f84;">Пока нет задач</td>`;
            historyBody.appendChild(row);
            return;
        }

        history.forEach((item) => {
            const row = document.createElement('tr');
            const dataText = item.data ? JSON.stringify(item.data) : '-';

            row.innerHTML = `
                <td>${formatTime(item.updatedAt || item.createdAt)}</td>
                <td>${item.requestId || '-'}</td>
                <td>${item.hash || '-'}</td>
                <td>${item.maxLength ?? '-'}</td>
                <td><span class="status-pill ${statusClass(item.status)}">${item.status || '-'}</span></td>
                <td>${dataText}</td>
                <td><button class="small-btn secondary" type="button" data-use-id="${item.requestId}">Подставить ID</button></td>
            `;
            historyBody.appendChild(row);
        });
    }

    function formatTime(iso) {
        if (!iso) return '-';
        const date = new Date(iso);
        if (Number.isNaN(date.getTime())) return '-';
        return date.toLocaleString();
    }
</script>
</body>
</html>
