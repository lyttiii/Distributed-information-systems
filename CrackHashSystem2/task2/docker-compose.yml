services:
  rabbitmq:
    image: rabbitmq:3.13-management
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo1:
    image: mongo:7.0
    hostname: mongo1
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo1_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 20

  mongo2:
    image: mongo:7.0
    hostname: mongo2
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo2_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 20

  mongo3:
    image: mongo:7.0
    hostname: mongo3
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo3_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 20

  mongo-init:
    image: mongo:7.0
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    restart: "no"
    command: >
      bash -lc "
      mongosh --host mongo1 --quiet --eval '
      try {
        rs.status().ok;
      } catch (e) {
        rs.initiate({
          _id: \"rs0\",
          members: [
            { _id: 0, host: \"mongo1:27017\" },
            { _id: 1, host: \"mongo2:27017\" },
            { _id: 2, host: \"mongo3:27017\" }
          ]
        });
      }
      ';
      until mongosh --host mongo1 --quiet --eval \"rs.status().members.some(m => m.stateStr === 'PRIMARY')\" | grep true; do sleep 2; done
      "

  manager:
    build:
      context: .
      dockerfile: manager/Dockerfile
    container_name: manager
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo1:27017,mongo2:27017,mongo3:27017/crackhash?replicaSet=rs0&w=majority
      SPRING_RABBITMQ_HOST: rabbitmq
      CRACKHASH_MANAGER_PART_COUNT: 12
      CRACKHASH_MANAGER_WORKER_IDS: worker1,worker2,worker3
      CRACKHASH_MANAGER_REQUEST_TIMEOUT: 5m
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully

  worker1:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: worker1
    environment:
      SERVER_PORT: 8081
      SPRING_RABBITMQ_HOST: rabbitmq
      CRACKHASH_WORKER_ID: worker1
    depends_on:
      rabbitmq:
        condition: service_healthy

  worker2:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: worker2
    environment:
      SERVER_PORT: 8081
      SPRING_RABBITMQ_HOST: rabbitmq
      CRACKHASH_WORKER_ID: worker2
    depends_on:
      rabbitmq:
        condition: service_healthy

  worker3:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: worker3
    environment:
      SERVER_PORT: 8081
      SPRING_RABBITMQ_HOST: rabbitmq
      CRACKHASH_WORKER_ID: worker3
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data:
  mongo1_data:
  mongo2_data:
  mongo3_data:
